
<!-- VIEW SERVICE MODAL -->

<div *ngIf="showModal" class="custom-modal-backdrop">

<div class="custom-modal">

<div class="modal-header bg-gradient">

<h5 class="modal-title">
<i class="bi bi-file-earmark-text"></i>
Service Request Details
</h5>

<button class="btn-close" (click)="showModal=false"></button>

</div>


<div class="modal-body" *ngIf="selectedService">

<div class="row g-3">

<div class="col-md-6">
<label>Application Number</label>
<div class="detail-box">{{selectedService.applicationNumber}}</div>
</div>

<div class="col-md-6">
<label>Service Type</label>
<div class="detail-box">{{selectedService.serviceType}}</div>
</div>

<div class="col-md-6">
<label>Purpose</label>
<div class="detail-box">{{selectedService.purpose}}</div>
</div>

<div class="col-md-6">
<label>Requested Ward</label>
<div class="detail-box">{{selectedService.requestedWard}}</div>
</div>

<div class="col-md-6">
<label>Priority</label>
<div class="detail-box">
{{selectedService.priorityLevel == 1 ? 'Urgent':'Normal'}}
</div>
</div>

<div class="col-md-6">
<label>Submitted Date</label>
<div class="detail-box">{{selectedService.createdAt}}</div>
</div>

</div>
</div>


<div class="modal-footer">

<button class="btn btn-secondary"
(click)="showModal=false">
Close
</button>

</div>

</div>
</div>

<div *ngIf="isBrowser" class="mt-4">
  <ag-grid-angular
  *ngIf="isBrowser"
    class="ag-theme-alpine"
    style="width: 100%; height: 500px;"
    [rowData]="rowData"
    [columnDefs]="columnDefs"
    [pagination]="true"
    [rowHeight]="110"
    [paginationPageSize]="pageSize"
    [context]="{ componentParent: this }"
    [stopEditingWhenCellsLoseFocus]="true"
    
    >
  </ag-grid-angular>
</div>
