<button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#serviceRequestModal">
  Request Service
</button>

<div class="modal fade" id="serviceRequestModal" tabindex="-1">
  <div class="modal-dialog modal-xl">
    <div class="modal-content">
      <div class="modal-header bg-dark text-white">
        <h5 class="modal-title">Smart Ward Service Portal</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>

      <form [formGroup]="requestForm" (ngSubmit)="onSubmit()">
        <div class="modal-body">
          <div class="row g-3 border-bottom pb-4 mb-4">
            <h6 class="text-primary">General Information</h6>
            <div class="col-md-4">
              <label class="form-label">Select Service Type</label>
              <select class="form-select border-primary" formControlName="ServiceType">
                <option value="" disabled>Choose...</option>
                <option *ngFor="let opt of serviceOptions" [value]="opt.value">{{opt.label}}</option>
              </select>
            </div>
            <div class="col-md-4">
              <label class="form-label">Purpose</label>
              <input type="text" class="form-control" formControlName="Purpose">
            </div>
            <div class="col-md-2">
              <label class="form-label">Ward No</label>
              <input type="text" class="form-control" formControlName="RequestedWard">
            </div>
            <div class="col-md-2">
              <label class="form-label">Municipality</label>
              <input type="text" class="form-control" formControlName="RequestedMunicipality">
            </div>
            <div class="col-md-2">
              <label class="form-label">Priority</label>
              <select class="form-select" formControlName="PriorityLevel">
                <option value="0">Normal</option>
                <option value="1">Urgent</option>
              </select>
            </div>
          </div>

          <div [ngSwitch]="selectedService" *ngIf="selectedService">
            
            <div *ngSwitchCase="7" class="row g-3">
              <h6 class="text-success">Birth Details</h6>
              <div class="col-md-4"><label>Child Full Name</label><input class="form-control" formControlName="ChildFullName"></div>
              <div class="col-md-4"><label>Date of Birth</label><input type="date" class="form-control" formControlName="DateOfBirth"></div>
              <div class="col-md-4"><label>Gender</label><select class="form-select" formControlName="Gender"><option value="Male">Male</option><option value="Female">Female</option></select></div>
              <div class="col-md-4"><label>Father's Name</label><input class="form-control" formControlName="FatherFullName"></div>
              <div class="col-md-4"><label>Mother's Name</label><input class="form-control" formControlName="MotherFullName"></div>
              <div class="col-md-4"><label>Grandfather's Name</label><input class="form-control" formControlName="GrandfatherFullName"></div>
            </div>

            <div *ngSwitchCase="1" class="row g-3">
              <h6 class="text-danger">Deceased Details</h6>
              <div class="col-md-4"><label>Deceased Name</label><input class="form-control" formControlName="DeceasedFullName"></div>
              <div class="col-md-4"><label>Date of Death</label><input type="date" class="form-control" formControlName="DateOfDeath"></div>
              <div class="col-md-4"><label>Citizenship No</label><input class="form-control" formControlName="CitizenshipNoOfDeceased"></div>
            </div>

            <div *ngSwitchCase="2" class="row g-3">
              <h6 class="text-info">Recommendation Details</h6>
              <div class="col-md-6"><label>Category (Scholarship/Job/etc)</label><input class="form-control" formControlName="LetterCategory"></div>
              <div class="col-md-6"><label>Recipient Org</label><input class="form-control" formControlName="RecipientOrganization"></div>
            </div>

            <div *ngSwitchCase="3" class="row g-3">
              <h6 class="text-warning">Land/House Details</h6>
              <div class="col-md-3"><label>Kitta No (Plot)</label><input class="form-control" formControlName="PlotNumber"></div>
              <div class="col-md-3"><label>Sheet No</label><input class="form-control" formControlName="SheetNumber"></div>
              <div class="col-md-3"><label>Total Area</label><input class="form-control" formControlName="TotalArea"></div>
              <div class="col-md-3"><label>Revenue Receipt No</label><input class="form-control" formControlName="LandRevenueReceiptNumber"></div>
            </div>

            <div *ngSwitchCase="4" class="row g-3">
              <h6 class="text-primary">Marriage Details</h6>
              <div class="col-md-6"><label>Groom Name</label><input class="form-control" formControlName="GroomFullName"></div>
              <div class="col-md-6"><label>Bride Name</label><input class="form-control" formControlName="BrideFullName"></div>
              <div class="col-md-6"><label>Groom Citizenship</label><input class="form-control" formControlName="GroomCitizenshipNo"></div>
              <div class="col-md-6"><label>Bride Citizenship</label><input class="form-control" formControlName="BrideCitizenshipNo"></div>
              <div class="col-md-6"><label>Date</label><input type="date" class="form-control" formControlName="MarriageDate"></div>
            </div>

            <div *ngSwitchCase="5" class="row g-3">
              <h6 class="text-secondary">Migration Details</h6>
              <div class="col-md-4"><label>Type</label><select class="form-select" formControlName="MigrationType"><option value="Incoming">Incoming</option><option value="Outgoing">Outgoing</option></select></div>
              <div class="col-md-4"><label>From</label><input class="form-control" formControlName="OriginAddress"></div>
              <div class="col-md-4"><label>To</label><input class="form-control" formControlName="DestinationAddress"></div>
            </div>

            <div *ngSwitchCase="6" class="row g-3">
              <h6 class="text-dark">Verification Details</h6>
              <div class="col-md-4"><label>House No</label><input class="form-control" formControlName="HouseNumber"></div>
              <div class="col-md-4"><label>Street Name</label><input class="form-control" formControlName="StreetName"></div>
              <div class="col-md-4"><label>Years of Stay</label><input type="number" class="form-control" formControlName="YearsOfStay"></div>
            </div>

            <div *ngSwitchDefault class="alert alert-light text-center">
              Please select a Service Type above to see specific fields.
            </div>
          </div>

          <div class="mt-4">
            <label class="form-label">Description / Extra Details</label>
            <textarea class="form-control" formControlName="Description" rows="2"></textarea>
          </div>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
          <button type="submit" class="btn btn-success" [disabled]="requestForm.invalid">Submit Application</button>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- AgGrid -->
 <div  *ngIf="isBrowser" class="mt-4">
  <ag-grid-angular
    style="width: 100%; height: 500px;"
    [rowData]="rowData"
    [columnDefs]="columnDefs"
    [pagination]="true"
    [paginationPageSize]="pageSize"
    [paginationPageSizeSelector]="[5, 7, 10, 20]"
    class="ag-theme-quartz">
  </ag-grid-angular>
</div>
