<div class="notice-board-container">
  <header class="board-header">
    <h1>Ward Notices</h1>
    <button class="btn-publish" (click)="openPublishModal()">
      + Publish New Notice
    </button>
  </header>

  <!-- Modal / Form Overlay -->
  <div class="modal-overlay" *ngIf="isModalOpen">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Publish Notice</h2>
        <button class="close-btn" (click)="closePublishModal()">&times;</button>
      </div>
      
      <div class="modal-body">
        <form (ngSubmit)="publishNotice()">
          <div class="form-group">
            <label for="title">Notice Title</label>
            <input 
              type="text" 
              id="title" 
              [(ngModel)]="newNoticeTitle" 
              name="title" 
              placeholder="e.g., Office Closure"
              required
            >
          </div>

          <div class="form-group">
            <label for="content">Content</label>
            <textarea 
              id="content" 
              [(ngModel)]="newNoticeContent" 
              name="content" 
              rows="5" 
              placeholder="Enter details here..."
              required
            ></textarea>
          </div>

          <div class="form-group">
            <label for="author">Author</label>
            <input 
              type="text" 
              id="author" 
              [(ngModel)]="newNoticeAuthor" 
              name="author" 
            >
          </div>

          <div class="form-actions">
            <button type="button" class="btn-cancel" (click)="closePublishModal()">Cancel</button>
            <button type="submit" class="btn-submit">Publish</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Notices List -->
  <div class="notices-list">
    <h3>Published Notices</h3>
    
    <div *ngIf="notices.length === 0" class="empty-state">
      <p>No notices published yet.</p>
    </div>

    <div class="notice-card" *ngFor="let notice of notices">
      <div class="notice-header">
        <h4>{{ notice.title }}</h4>
        <span class="date-badge">{{ notice.publishedDate | date:'medium' }}</span>
      </div>
      <p class="notice-body">{{ notice.content }}</p>
      <div class="notice-footer">
        <small>By: {{ notice.author }}</small>
      </div>
    </div>
  </div>
</div>
